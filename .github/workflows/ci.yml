name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
defaults:
  run:
    working-directory: chatbot-web
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chatbot-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: chatbot
          POSTGRES_USER: chatbot
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatbot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chatbot-web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://chatbot:testpass@localhost:5432/chatbot
      - run: npx prisma db push
        env:
          DATABASE_URL: postgresql://chatbot:testpass@localhost:5432/chatbot
      - run: npm run build
        env:
          DATABASE_URL: postgresql://chatbot:testpass@localhost:5432/chatbot
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
